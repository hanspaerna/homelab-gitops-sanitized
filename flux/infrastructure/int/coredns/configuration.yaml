apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
data:
  Corefile: |
    lan:53 {
      errors
      cache 30
      forward . 192.168.1.1
    }
      
    .:53 {
        errors
        health
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
        }
        hosts /etc/coredns/NodeHosts {
          ttl 60
          reload 15s
          fallthrough
        }
        prometheus :9153
        
        forward . 10.45.100.100 /etc/resolv.conf {
          policy sequential
          health_check 5s
        }
        
        cache 30
        loop
        reload
        loadbalance
        import /etc/coredns/custom/*.override
    }
    import /etc/coredns/custom/*.server