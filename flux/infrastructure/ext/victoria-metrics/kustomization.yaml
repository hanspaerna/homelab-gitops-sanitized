namespace: victoria-metrics

resources:
  - ../../base/victoria-metrics/
  - httproute.yaml
  - scrape-config.yaml

patches:
  - target:
      kind: StatefulSet
      name: victoria-metrics-victoria-metrics-single-server
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args/5
        value: --retentionPeriod=14d
      - op: add
        path: /spec/template/spec/containers/0/args/5
        value: --search.latencyOffset=0 # see: https://github.com/VictoriaMetrics/VictoriaMetrics/issues/2061#issuecomment-1299109836