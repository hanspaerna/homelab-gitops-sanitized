apiVersion: apps/v1
kind: Deployment
metadata:
  name: blocky
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blocky
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blocky
    spec:
      containers:
        - name: blocky
          image: spx01/blocky:v0.33.0
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
          volumeMounts:
            - name: blocky-config
              mountPath: /app/config.yml
              subPath: config.yml
              readOnly: true
            - name: blocky-logs
              mountPath: /logs
      volumes:
        - name: blocky-config
          configMap:
            name: blocky-config
        - name: blocky-logs
          persistentVolumeClaim:
            claimName: blocky-logs-pvc