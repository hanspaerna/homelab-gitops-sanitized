---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
data:
  config.yaml: |
    # The public HTTPS URL clients will connect to.
    # DERP requires TLS, so this must be https://
    server_url: https://headscale.lab.com
    
    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: 0.0.0.0:9090
    
    trusted_proxies: []

    noise:
      # The Noise private key is used to encrypt the traffic between headscale and
      # Tailscale clients when using the new Noise-based protocol. A missing key
      # will be automatically generated.
      private_key_path: /var/lib/headscale/noise_private.key
  
    database:
        type: sqlite
        sqlite:
          path: /var/lib/headscale/db.sqlite
      
    # TLS: disabled here because TLS is terminated at the ingress.
    tls_cert_path: ""
    tls_key_path: ""
    
    # Log level: trace | debug | info | warn | error
    log:
      level: info
      format: text
    
    # IP prefixes assigned to tailnet nodes
    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48
      allocation: sequential
    
    # DNS settings pushed to nodes
    dns:
      magic_dns: true
      base_domain: hs.lab.com   # change to your preferred internal domain
      nameservers:
        global:
          - 1.1.1.1
          - 8.8.8.8

    node:
      expiry: 0
      
    policy:
      mode: file
      path: "/etc/headscale/policy.json"
    
    taildrop:
      enabled: false
      
    logtail:
      enabled: false

    auto_update:
      enabled: false

    derp:
      server:
        # Enable the embedded DERP + STUN server
        enabled: true
        
        # Region ID 999 is the conventional default for embedded DERP.
        # Must not collide with any region in the DERP URLs below.
        region_id: 999
        region_code: "headscale"
        region_name: "Headscale Embedded DERP"
        
        # Only allow nodes registered with THIS headscale instance to use
        # the DERP relay — prevents abuse by external Tailscale clients.
        verify_clients: true
        
        # Exposed as UDP/30478, must be reachable publicly.
        stun_listen_addr: "0.0.0.0:30478"
        
        # Private key for the DERP server. Auto-generated if missing.
        private_key_path: /var/lib/headscale/derp_server_private.key
        
        # Automatically include this embedded DERP in the DERP map sent to
        # clients. Set to false only if you manage the map via derp.paths.
        automatically_add_embedded_derp_region: true
        
        # Public IPs of this server — important for clients that cannot
        # resolve the hostname, e.g. when DNS is broken on an exit node.
        # Replace with your actual public IPs.
        # ipv4: 198.51.100.1   # REPLACE with your public IPv4
        # ipv6: 2001:db8::1  # REPLACE with your public IPv6 if available
      
      # DERP fallbacks
      urls: []
      
      # Local DERP map YAML files (optional, leave empty if not needed)
      paths: []
      
      auto_update_enabled: false
      
    oidc:
      only_start_if_oidc_is_available: true
      issuer: "https://auth.lab.com"
      client_id: "headscale" # secret is passed via env var
      pkce:
        enabled: true
      scope: ["openid", "email", "profile", "groups"]
      allowed_groups:
        - admins