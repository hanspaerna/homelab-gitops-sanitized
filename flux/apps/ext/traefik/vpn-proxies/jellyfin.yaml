---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-vpn-ingressroute
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellyfin.lab.com`)
      middlewares:
      - name: bouncer
      - name: authelia-auth
      - name: jellyfin-host-rewrite
      kind: Rule
      services:
      - name: jellyfin-vpn
        kind: Service
        scheme: https
        port: 443
  tls:
    secretName: letsencrypt-dns-wildcard-cert
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-vpn
spec:
  type: ExternalName
  externalName: jellyfin.vpn.lab.com
  ports:
    - name: https
      port: 443
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jellyfin-host-rewrite
spec:
  headers:
    customRequestHeaders:
      Host: jellyfin.vpn.lab.com
