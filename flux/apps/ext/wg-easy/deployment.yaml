apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-easy
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wg-easy
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wg-easy
    spec:
      hostNetwork: true
      containers:
        - name: wg-easy
          image: ghcr.io/wg-easy/wg-easy:development
          imagePullPolicy: IfNotPresent
          # Give pod permissions to modify iptables and load the wireguard kernel module
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          ports:
            - containerPort: 30000
              name: wg
              protocol: UDP
            - containerPort: 51821
              name: http
              protocol: TCP
          env:
            - name: INIT_ENABLED
              value: "true"
            - name: INIT_HOST
              value: "lab.com"
            - name: INIT_USERNAME
              value: "disabled"
            - name: INIT_PASSWORD
              value: "disabled"
            - name: INIT_PORT
              value: "30000"
            - name: INIT_ALLOWED_IPS
              value: "100.64.0.0/10,fd7a:115c:a1e0::/48"
              # set MagicDNS pseudo-server from Headscale; provides access to dynamic hostnames to easy-wg clients
            - name: INIT_DNS
              value: "100.100.100.100,d7a:115c:a1e0::53"
            - name: HOST
              value: "127.0.0.1" # block access from external internet without reverse proxy
            - name: OAUTH_PROVIDERS
              value: "oidc"
            - name: OAUTH_AUTO_REGISTER
              value: "true"
            - name: OAUTH_AUTO_LAUNCH
              value: "true"
            - name: DISABLE_PASSWORD_AUTH
              value: "true"
            - name: OAUTH_OIDC_SERVER
              value: "https://auth.lab.com"
            - name: OAUTH_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wg-easy-secret
                  key: OAUTH_OIDC_CLIENT_SECRET
            - name: OAUTH_OIDC_CLIENT_ID
              value: "wg-easy"
            - name: OAUTH_OIDC_NAME
              value: "wg-easy"
            # WG_* envs are broken in v15, needs to be set manually in the Admin UI
            - name: WG_POST_UP
              value: "iptables -A INPUT -p udp -m udp --dport {{port}} -j ACCEPT; iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; ip6tables -A INPUT -p udp -m udp --dport {{port}} -j ACCEPT; ip6tables -A FORWARD -i wg0 -j ACCEPT; ip6tables -A FORWARD -o wg0 -j ACCEPT;"
            - name: WG_POST_DOWN
              value: "iptables -D INPUT -p udp -m udp --dport {{port}} -j ACCEPT; iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; ip6tables -D INPUT -p udp -m udp --dport {{port}} -j ACCEPT; ip6tables -D FORWARD -i wg0 -j ACCEPT; ip6tables -D FORWARD -o wg0 -j ACCEPT;"
          # Use the http server for pod health checks
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
              host: 127.0.0.1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
              host: 127.0.0.1
            timeoutSeconds: 1
          startupProbe:
            failureThreshold: 30
            periodSeconds: 5
            successThreshold: 1
            tcpSocket:
              port: http
              host: 127.0.0.1
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /etc/wireguard
              name: config
      restartPolicy: Always
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: wg-easy-pvc
        - name: tun-device
          hostPath:
            path: /dev/net/tun
            type: CharDevice