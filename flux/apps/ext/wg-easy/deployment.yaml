apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-easy
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wg-easy
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wg-easy
    spec:
      # we don't want any traffic to go via the Tailnet peer that is already attached to host network, so we block this path
      # and expect to use pod's own Tailscale client to expose plain wireguard peers to Tailnet network
      initContainers:
        - name: block-access-to-host-tailnet-peer
          image: busybox:1.36
          securityContext:
            capabilities:
              add: [ "NET_ADMIN" ]
          command:
            - sh
            - -c
            - |
              ip route add blackhole 100.64.0.0/10 metric 1
              ip -6 route add blackhole fd7a:115c:a1e0::/48 metric 1

      containers:
        - name: tailscale
          image: tailscale/tailscale:v1.98.4
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
          env:
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: headscale-setup-key # not a part of the repo, should be applied to cluster with Ansible (headscale-setup.yml)
                  key: key
                  optional: true
            - name: TS_KUBE_SECRET
              value: "" # prevent containerboot from touching Kubernetes API
            - name: TS_STATE_DIR
              value: "/var/lib/tailscale"
            # snat-subnet-router=false preserves original source IPs behind the router
            # NB! With TS_AUTH_ONCE=true, extra args will have an effect only once
            - name: TS_EXTRA_ARGS
              value: "--login-server=https://headscale.lab.com --snat-subnet-routes=false"
            - name: TS_ENABLE_HEALTH_CHECK
              value: "true"
            - name: TS_USERSPACE
              value: "false" # required to make source ip persistent in the outer network instead of NAT masquerading
            - name: TS_HOSTNAME
              value: "wg-easy-router"
            # advertise subnet routes so other devices in your tailnet can reach networks accessible from this container
            - name: TS_ROUTES
              value: "10.8.0.0/24" # a default wg-easy ipv4 range

          readinessProbe:
            exec:
              command: [ "wget", "--spider", "-q", "http://127.0.0.1:9002/healthz" ]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /var/lib/tailscale
            - name: tun-device
              mountPath: /dev/net/tun

        - name: wg-easy
          env:
            - name: INIT_ENABLED
              value: "true"
            - name: INIT_HOST
              value: "lab.com"
            - name: INIT_USERNAME
              value: "disabled"
            - name: INIT_PASSWORD
              value: "disabled"
            - name: INIT_PORT
              value: "30000"
            - name: INIT_ALLOWED_IPS
              value: "100.64.0.0/10,fd7a:115c:a1e0::/48"
            - name: OAUTH_PROVIDERS
              value: "oidc"
            - name: OAUTH_AUTO_REGISTER
              value: "true"
            - name: OAUTH_AUTO_LAUNCH
              value: "true"
            - name: DISABLE_PASSWORD_AUTH
              value: "true"
            - name: OAUTH_OIDC_SERVER
              value: "https://auth.lab.com"
            - name: OAUTH_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wg-easy-secret
                  key: OAUTH_OIDC_CLIENT_SECRET
            - name: OAUTH_OIDC_CLIENT_ID
              value: "wg-easy"
            - name: OAUTH_OIDC_NAME
              value: "wg-easy"
          image: ghcr.io/wg-easy/wg-easy:development
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 30000
              name: wg
              protocol: UDP
            - containerPort: 51821
              name: http
              protocol: TCP
          # Use the http server for pod health checks
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 1
          startupProbe:
            failureThreshold: 30
            periodSeconds: 5
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 1
          # Give pod permissions to modify iptables and load the wireguard kernel module
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          volumeMounts:
            - mountPath: /etc/wireguard
              name: config
      restartPolicy: Always
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: wg-easy-pvc
        - name: tun-device
          hostPath:
            path: /dev/net/tun
            type: CharDevice