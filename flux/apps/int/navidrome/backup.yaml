---
apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: backup-schedule
spec:
  backend:
    repoPasswordSecretRef:
      name: k8up-secret
      key: RESTIC_PASSWORD
    s3:
      endpoint: https://api-s3.vpn.lab.com
      bucket: navidrome # must match the namespace!
      accessKeyIDSecretRef:
        name: k8up-secret
        key: AWS_ACCESS_KEY_ID
      secretAccessKeySecretRef:
        name: k8up-secret
        key: AWS_SECRET_ACCESS_KEY
  podSecurityContext:
    fsGroup: 0
    runAsUser: 0
  backup:
    schedule: "45 1 * * *"
    failedJobsHistoryLimit: 1
    successfulJobsHistoryLimit: 1
  prune:
    schedule: "0 3 * * 0"
    retention:
      keepDaily: 7
      keepWeekly: 4
      keepMonthly: 3
