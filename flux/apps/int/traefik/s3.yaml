---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: s3-ingressroute
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`s3.vpn.lab.com`)
      kind: Rule
      services:
      - name: s3
        kind: Service
        scheme: http
        port: 9000
  tls:
    secretName: letsencrypt-dns-wildcard-cert
---
apiVersion: v1
kind: Service
metadata:
  name: s3
spec:
  type: ExternalName
  externalName: truenas.lan
  ports:
    - name: http
      port: 9000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: s3-api-ingressroute
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`api-s3.vpn.lab.com`)
      kind: Rule
      services:
      - name: s3-api
        kind: Service
        scheme: http
        port: 9002
  tls:
    secretName: letsencrypt-dns-wildcard-cert
---
apiVersion: v1
kind: Service
metadata:
  name: s3-api
spec:
  type: ExternalName
  externalName: truenas.lan
  ports:
    - name: http
      port: 9002
