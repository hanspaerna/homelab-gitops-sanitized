- name: Configure Headplane
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check if Headscale namespace on ext already has an API key (skip if the secret already exists in k3s-ext)
      ansible.builtin.shell: |
        kubectl get secrets -n headscale | grep headscale-api-key
      environment:
        KUBECONFIG: "{{ playbook_dir }}/../.kubeconfig-external"
      register: api_key_check_result
      failed_when: "false"
      changed_when: "false"

    - name: Generate API key for Headplane
      when: api_key_check_result.stdout == ''
      ansible.builtin.shell: |
        kubectl exec -n headscale deploy/headscale -c headscale -- headscale apikeys create -e 100y
      environment:
        KUBECONFIG: "{{ playbook_dir }}/../.kubeconfig-external"
      register: api_key_result
      changed_when: "'created' in api_key_result.stdout or 'configured' in api_key_result.stdout"

    - name: Read API secret's template
      when: api_key_check_result.stdout == ''
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/templates/headscale-api-key-template.yaml"
      register: api_secret_template

    - name: Substitute API key in template (k3s-ext)
      when: api_key_check_result.stdout == ''
      ansible.builtin.set_fact:
        api_secret_manifest: "{{ (api_secret_template.content | b64decode) | regex_replace('INSERT-SOME-KEY', api_key_result.stdout) }}"

    - name: Apply a Secret with the API key to ext cluster
      when: api_key_check_result.stdout == ''
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        {{ api_secret_manifest }}
        EOF
      environment:
        KUBECONFIG: "{{ playbook_dir }}/../.kubeconfig-external"
      register: api_secret_apply_result
      changed_when: "'created' in api_secret_apply_result.stdout or 'configured' in api_secret_apply_result.stdout"

    - name: Force recreate the headscale pod
      when: api_key_check_result.stdout == ''
      ansible.builtin.shell: |
        kubectl rollout restart deployment/headscale -n headscale
      environment:
        KUBECONFIG: "{{ playbook_dir }}/../.kubeconfig-external"
      changed_when: "false"

    - name: Wait for rollout to complete
      when: api_key_check_result.stdout == ''
      ansible.builtin.command: kubectl rollout status deployment/headscale -n headscale --timeout=120s
      environment:
        KUBECONFIG: "{{ playbook_dir }}/../.kubeconfig-external"
      register: rollout_result
      changed_when: "false"

- name: Add k3s-ext cluster to Tailnet as a node
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check if k3s-ext node is already in Tailnet
      ansible.builtin.shell: |
        kubectl exec -n headscale deploy/headscale -c headscale -- headscale nodes list | grep tag:k3s-ext
      environment:
        KUBECONFIG: "{{ playbook_dir }}/../.kubeconfig-external"
      register: ext_node_check_result
      failed_when: "ext_node_check_result.stderr != ''"
      changed_when: "false"

    - name: Generate pre-auth key
      when: ext_node_check_result.stdout == ''
      ansible.builtin.shell: |
        kubectl exec -n headscale deploy/headscale -c headscale -- headscale preauthkeys create --tags tag:k3s-ext
      environment:
        KUBECONFIG: "{{ playbook_dir }}/../.kubeconfig-external"
      register: preauth_key_ext_result
      changed_when: "'hskey-auth-' in preauth_key_ext_result.stdout"

    - name: Read setup key secret's template
      when: ext_node_check_result.stdout == ''
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/templates/headscale-setup-key-template.yaml"
      register: preauth_key_secret_template

    - name: Substitute setup key in template
      when: ext_node_check_result.stdout == ''
      ansible.builtin.set_fact:
        preauth_key_ext_manifest: "{{ (preauth_key_secret_template.content | b64decode) | regex_replace('INSERT-SOME-KEY', preauth_key_ext_result.stdout) }}"

    - name: Apply a Secret with the pre-auth key to ext cluster
      when: ext_node_check_result.stdout == ''
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        {{ preauth_key_ext_manifest }}
        EOF
      environment:
        KUBECONFIG: "{{ playbook_dir }}/../.kubeconfig-external"
      register: preauth_key_ext_apply_result
      changed_when: "'created' in preauth_key_ext_apply_result.stdout or 'configured' in preauth_key_ext_apply_result.stdout"

    - name: Force recreate the client pod
      when: ext_node_check_result.stdout == ''
      ansible.builtin.shell: |
        kubectl rollout restart deployment/tailscale-client -n tailscale-client
      environment:
        KUBECONFIG: "{{ playbook_dir }}/../.kubeconfig-external"
      changed_when: "false"

    - name: Wait for rollout to complete
      when: ext_node_check_result.stdout == ''
      ansible.builtin.command: kubectl rollout status deployment/tailscale-client -n tailscale-client --timeout=120s
      environment:
        KUBECONFIG: "{{ playbook_dir }}/../.kubeconfig-external"
      register: rollout_result
      changed_when: "false"

