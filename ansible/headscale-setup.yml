        src: "{{ playbook_dir }}/templates/headscale-setup-key-wg-easy-template.yaml"
      register: preauth_key_secret_template

    - name: Substitute setup key in template
      when: wg_easy_node_check_result.stdout == ''
      ansible.builtin.set_fact:
        preauth_key_wg_easy_manifest: "{{ (preauth_key_secret_template.content | b64decode) | regex_replace('INSERT-SOME-KEY', preauth_key_wg_easy_result.stdout) }}"

    - name: Apply a Secret with the pre-auth key to wg-easy namespace
      when: wg_easy_node_check_result.stdout == ''
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
